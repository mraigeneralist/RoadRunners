<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — RoadRunners Bookings</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='4' fill='%230a0a0a'/><text x='50%25' y='54%25' dominant-baseline='central' text-anchor='middle' font-family='serif' font-weight='900' font-size='14' fill='%23d4a017'>RR</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #0a0a0a;
      --bg-card: #111111;
      --border: #1e1e1e;
      --border-mid: #2a2a2a;
      --gold: #d4a017;
      --gold-bright: #f0b429;
      --text: #f0f0ea;
      --muted: #888888;
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 2px; }

    .admin-header {
      border-bottom: 1px solid var(--border);
      padding: 1.25rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      background: var(--bg-card);
    }
    .admin-logo {
      font-family: 'Montserrat', sans-serif;
      font-weight: 900;
      font-size: 0.95rem;
      color: var(--text);
      letter-spacing: 0.05em;
    }
    .admin-logo span { color: var(--gold); font-size: 0.65rem; font-weight: 600; letter-spacing: 0.15em; text-transform: uppercase; margin-left: 10px; }
    .admin-back {
      font-family: 'Montserrat', sans-serif;
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--muted);
      text-decoration: none;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      transition: color 0.2s;
    }
    .admin-back:hover { color: var(--gold); }

    .admin-content {
      max-width: 1200px;
      margin: 0 auto;
      padding: 2rem;
    }

    .admin-stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
      margin-bottom: 2rem;
    }
    .stat-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1.25rem;
    }
    .stat-label {
      font-family: 'Montserrat', sans-serif;
      font-size: 0.6rem;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.35rem;
    }
    .stat-value {
      font-family: 'Montserrat', sans-serif;
      font-size: 1.5rem;
      font-weight: 800;
      color: var(--gold);
    }

    .admin-title {
      font-family: 'Montserrat', sans-serif;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 1rem;
    }

    .filter-row {
      display: flex;
      gap: 10px;
      margin-bottom: 1rem;
      flex-wrap: wrap;
    }
    .filter-btn {
      padding: 0.5rem 1rem;
      font-family: 'Montserrat', sans-serif;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      border-radius: 6px;
      cursor: pointer;
      border: 1px solid var(--border);
      background: var(--bg-card);
      color: var(--muted);
      transition: all 0.2s;
    }
    .filter-btn:hover { border-color: var(--border-mid); color: var(--text); }
    .filter-btn.active { border-color: var(--gold); color: var(--gold); background: rgba(212,160,23,0.06); }

    .table-wrap {
      overflow-x: auto;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 800px;
    }
    th {
      font-family: 'Montserrat', sans-serif;
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      text-align: left;
      padding: 0.85rem 1rem;
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }
    td {
      padding: 0.75rem 1rem;
      border-bottom: 1px solid rgba(30,30,30,0.5);
      font-size: 0.82rem;
      color: var(--text);
      white-space: nowrap;
    }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(212,160,23,0.02); }

    .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      font-family: 'Montserrat', sans-serif;
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .badge-confirmed {
      background: rgba(34,197,94,0.1);
      color: #22c55e;
      border: 1px solid rgba(34,197,94,0.2);
    }
    .badge-past {
      background: rgba(136,136,136,0.1);
      color: #888;
      border: 1px solid rgba(136,136,136,0.2);
    }
    .price-col { color: var(--gold); font-weight: 600; font-family: 'Montserrat', sans-serif; }
    .id-col { color: var(--muted); font-family: 'Montserrat', sans-serif; font-size: 0.75rem; font-weight: 600; }

    .empty-state {
      text-align: center;
      padding: 3rem;
      color: var(--muted);
    }
    .empty-state-icon {
      font-size: 2rem;
      margin-bottom: 0.5rem;
      opacity: 0.3;
    }

    @media (max-width: 768px) {
      .admin-content { padding: 1rem; }
      .admin-stats { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>
  <div class="admin-header">
    <div class="admin-logo">ROAD RUNNERS <span>Admin Dashboard</span></div>
    <a href="/" class="admin-back">&larr; Back to Site</a>
  </div>

  <div class="admin-content">
    <div class="admin-stats" id="admin-stats"></div>

    <div class="admin-title">Upcoming Bookings</div>

    <div class="filter-row">
      <button class="filter-btn active" data-filter="upcoming">Upcoming</button>
      <button class="filter-btn" data-filter="today">Today</button>
      <button class="filter-btn" data-filter="all">All</button>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Booking ID</th>
            <th>Date</th>
            <th>Time</th>
            <th>Customer</th>
            <th>Phone</th>
            <th>Vehicle</th>
            <th>Service</th>
            <th>Type</th>
            <th>Amount</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="bookings-body">
          <tr><td colspan="10" class="empty-state"><div class="empty-state-icon">&#128197;</div>Loading bookings...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <script>
    let allBookings = [];
    let currentFilter = 'upcoming';

    async function loadBookings() {
      try {
        const res = await fetch('/api/bookings');
        const data = await res.json();
        allBookings = data.bookings || [];
        renderStats();
        renderTable();
      } catch (err) {
        document.getElementById('bookings-body').innerHTML = '<tr><td colspan="10" class="empty-state">Failed to load bookings. Is the server running?</td></tr>';
      }
    }

    function renderStats() {
      const today = new Date().toISOString().split('T')[0];
      const upcoming = allBookings.filter(b => b.date >= today);
      const todayBookings = allBookings.filter(b => b.date === today);
      const totalRevenue = allBookings.reduce((sum, b) => sum + b.price, 0);

      document.getElementById('admin-stats').innerHTML = `
        <div class="stat-card">
          <div class="stat-label">Total Bookings</div>
          <div class="stat-value">${allBookings.length}</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Today</div>
          <div class="stat-value">${todayBookings.length}</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Upcoming</div>
          <div class="stat-value">${upcoming.length}</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Total Revenue</div>
          <div class="stat-value">\u20B9${totalRevenue.toLocaleString('en-IN')}</div>
        </div>
      `;
    }

    function renderTable() {
      const today = new Date().toISOString().split('T')[0];
      let filtered = allBookings;

      if (currentFilter === 'upcoming') {
        filtered = allBookings.filter(b => b.date >= today);
      } else if (currentFilter === 'today') {
        filtered = allBookings.filter(b => b.date === today);
      }

      const tbody = document.getElementById('bookings-body');

      if (filtered.length === 0) {
        tbody.innerHTML = `<tr><td colspan="10" class="empty-state"><div class="empty-state-icon">&#128197;</div>No bookings found</td></tr>`;
        return;
      }

      tbody.innerHTML = filtered.map(b => {
        const isPast = b.date < today;
        const dateObj = new Date(b.date + 'T00:00:00');
        const dateStr = dateObj.toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' });
        return `<tr>
          <td class="id-col">${b.id}</td>
          <td>${dateStr}</td>
          <td>${b.timeSlot}</td>
          <td>${escapeHtml(b.name)}</td>
          <td>+${b.phone}</td>
          <td>${escapeHtml(b.vehicleNumber)}</td>
          <td>${b.service}</td>
          <td>${b.vehicleType}</td>
          <td class="price-col">\u20B9${b.price.toLocaleString('en-IN')}</td>
          <td><span class="badge ${isPast ? 'badge-past' : 'badge-confirmed'}">${isPast ? 'Past' : b.status}</span></td>
        </tr>`;
      }).join('');
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    // Filter buttons
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentFilter = btn.dataset.filter;
        renderTable();
      });
    });

    loadBookings();

    // Auto-refresh every 30 seconds
    setInterval(loadBookings, 30000);
  </script>
</body>
</html>
